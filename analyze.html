<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIL Pattern Library - Analyze</title>
    <style>
        /* Typography & Spacing System */
        :root {
            /* Typography Scale */
            --font-size-xs: 10px;
            --font-size-sm: 11px;
            --font-size-base: 13px;
            --font-size-md: 14px;
            --font-size-lg: 16px;

            /* Font Weights */
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;

            /* Line Heights */
            --line-height-tight: 1.2;
            --line-height-normal: 1.5;
            --line-height-relaxed: 1.75;

            /* Spacing Scale (4px base unit) */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-2xl: 24px;
            --spacing-3xl: 32px;

            /* Component Padding */
            --padding-component: var(--spacing-md);
            --padding-component-lg: var(--spacing-lg);
            --padding-component-xl: var(--spacing-xl);

            /* Component Gaps */
            --gap-sm: var(--spacing-sm);
            --gap-md: var(--spacing-md);
            --gap-lg: var(--spacing-lg);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Courier New', monospace;
            background: #fafafa;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: var(--font-size-base);
            line-height: var(--line-height-normal);
            overflow: hidden;
        }

        /* Top Navigation Header */
        .top-header {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: var(--spacing-md) var(--spacing-xl);
            display: flex;
            align-items: center;
            gap: var(--spacing-xl);
            flex-shrink: 0;
            z-index: 1000;
        }

        .nav-link {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: #666;
            text-decoration: none;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.15s ease;
            cursor: pointer;
        }

        .nav-link:hover {
            color: #000;
        }

        .nav-link.active {
            color: #000;
        }

        .nav-separator {
            color: #e0e0e0;
            font-size: var(--font-size-sm);
        }

        /* Page Title Header */
        .page-title-header {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: var(--spacing-lg) var(--spacing-xl);
            flex-shrink: 0;
        }

        .page-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            color: #000;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Main Layout Container */
        .layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        /* Analyze Sidebar */
        .analyze-sidebar {
            width: 300px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Main Content Area */
        .analyze-main {
            flex: 1;
            overflow-y: auto;
            background: #fafafa;
            padding: var(--spacing-xl);
        }

        .analyze-main__placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: var(--font-size-sm);
            height: 100%;
            text-align: center;
            line-height: var(--line-height-relaxed);
        }

        .analyze-main__content {
            display: none;
        }

        .analyze-main__content.active {
            display: block;
        }

        .analyze-main__charts-grid {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xl);
            margin-top: var(--spacing-xl);
        }

        .analyze-main__chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-xl);
        }

        .analyze-main__chart-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: var(--spacing-xl);
        }

        .analyze-main__chart-full {
            grid-column: 1 / -1;
        }
    </style>

    <!-- Component CSS -->
    <link rel="stylesheet" href="css/components/base/patternExplorer.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/analysisDataLoader.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/variants/patternExplorerForAnalysis.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/summaryStats.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/radarChart.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/boxPlotChart.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/timeSeriesChart.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/tagFrequencyChart.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/tagWordCloud.css?v=2026-02-26.1">
</head>
<body>
    <!-- Top Navigation Header -->
    <div class="top-header">
        <a href="index.html" class="nav-link">Explore</a>
        <span class="nav-separator">|</span>
        <a href="test.html" class="nav-link">Test</a>
        <span class="nav-separator">|</span>
        <a href="analyze.html" class="nav-link active">Analyze</a>
    </div>

    <!-- Page Title Header -->
    <div class="page-title-header">
        <h1 class="page-title">Analyze Results</h1>
    </div>

    <!-- Main Layout -->
    <div class="layout">
        <!-- Left Sidebar -->
        <div class="analyze-sidebar">
            <div id="dataLoader"></div>
            <div id="patternList"></div>
        </div>

        <!-- Main Content Area -->
        <div class="analyze-main">
            <div class="analyze-main__placeholder" id="analyzePlaceholder">
                Load session data to begin analysis.
            </div>
            <div class="analyze-main__content" id="analyzeContent">
                <div id="summaryStats"></div>
                <div class="analyze-main__charts-grid">
                    <div class="analyze-main__chart-row">
                        <div class="analyze-main__chart-card analyze-main__chart-full">
                            <div id="timeSeriesChart"></div>
                        </div>
                    </div>
                    <div class="analyze-main__chart-row">
                        <div class="analyze-main__chart-card">
                            <div id="radarChart"></div>
                        </div>
                        <div class="analyze-main__chart-card">
                            <div id="boxPlotChart"></div>
                        </div>
                    </div>
                    <div class="analyze-main__chart-row">
                        <div class="analyze-main__chart-card">
                            <div id="tagFrequencyChart"></div>
                        </div>
                        <div class="analyze-main__chart-card">
                            <div id="tagWordCloud"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Plotly.js CDN -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>

    <!-- Module -->
    <script src="js/modules/analysisDataProcessor.js?v=2026-02-26.1"></script>

    <!-- Components -->
    <script src="js/components/base/patternExplorer.js?v=2026-02-26.1"></script>
    <script src="js/components/base/analysisDataLoader.js?v=2026-02-26.1"></script>
    <script src="js/components/variants/patternExplorerForAnalysis.js?v=2026-02-26.1"></script>
    <script src="js/components/base/summaryStats.js?v=2026-02-26.1"></script>
    <script src="js/components/base/radarChart.js?v=2026-02-26.1"></script>
    <script src="js/components/base/boxPlotChart.js?v=2026-02-26.1"></script>
    <script src="js/components/base/timeSeriesChart.js?v=2026-02-26.1"></script>
    <script src="js/components/base/tagFrequencyChart.js?v=2026-02-26.1"></script>
    <script src="js/components/base/tagWordCloud.js?v=2026-02-26.1"></script>
    <!-- Page Script -->
    <script src="js/analyze/config.js?v=2026-02-26.1"></script>
    <script src="js/analyze/state.js?v=2026-02-26.1"></script>
    <script src="js/analyze/app.js?v=2026-02-26.1"></script>
    <script src="js/analyze/bootstrap.js?v=2026-02-26.1"></script>
</body>
</html>
