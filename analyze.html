<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIL Pattern Library - Analyze</title>
    <style>
        /* Typography & Spacing System */
        :root {
            /* Typography Scale */
            --font-size-xs: 10px;
            --font-size-sm: 11px;
            --font-size-base: 13px;
            --font-size-md: 14px;
            --font-size-lg: 16px;

            /* Font Weights */
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;

            /* Line Heights */
            --line-height-tight: 1.2;
            --line-height-normal: 1.5;
            --line-height-relaxed: 1.75;

            /* Spacing Scale (4px base unit) */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-2xl: 24px;
            --spacing-3xl: 32px;

            /* Component Padding */
            --padding-component: var(--spacing-md);
            --padding-component-lg: var(--spacing-lg);
            --padding-component-xl: var(--spacing-xl);

            /* Component Gaps */
            --gap-sm: var(--spacing-sm);
            --gap-md: var(--spacing-md);
            --gap-lg: var(--spacing-lg);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Courier New', monospace;
            background: #fafafa;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: var(--font-size-base);
            line-height: var(--line-height-normal);
            overflow: hidden;
        }

        /* Top Navigation Header */
        .top-header {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: var(--spacing-md) var(--spacing-xl);
            display: flex;
            align-items: center;
            gap: var(--spacing-xl);
            flex-shrink: 0;
            z-index: 1000;
        }

        .nav-link {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: #666;
            text-decoration: none;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.15s ease;
            cursor: pointer;
        }

        .nav-link:hover {
            color: #000;
        }

        .nav-link.active {
            color: #000;
        }

        .nav-separator {
            color: #e0e0e0;
            font-size: var(--font-size-sm);
        }

        /* Page Title Header */
        .page-title-header {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: var(--spacing-lg) var(--spacing-xl);
            flex-shrink: 0;
        }

        .page-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            color: #000;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Main Layout Container */
        .layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        /* Analyze Sidebar */
        .analyze-sidebar {
            width: 300px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Main Content Area */
        .analyze-main {
            flex: 1;
            overflow-y: auto;
            background: #fafafa;
            padding: var(--spacing-xl);
        }

        .analyze-main__placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: var(--font-size-sm);
            height: 100%;
            text-align: center;
            line-height: var(--line-height-relaxed);
        }

        .analyze-main__content {
            display: none;
        }

        .analyze-main__content.active {
            display: block;
        }

        .analyze-main__charts-grid {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xl);
            margin-top: var(--spacing-xl);
        }

        .analyze-main__chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-xl);
        }

        .analyze-main__chart-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: var(--spacing-xl);
        }

        .analyze-main__chart-full {
            grid-column: 1 / -1;
        }
    </style>

    <!-- Component CSS -->
    <link rel="stylesheet" href="css/components/base/patternExplorer.css?v=7">
    <link rel="stylesheet" href="css/components/base/analysisDataLoader.css?v=1">
    <link rel="stylesheet" href="css/components/variants/patternExplorerForAnalysis.css?v=1">
    <link rel="stylesheet" href="css/components/base/summaryStats.css?v=1">
    <link rel="stylesheet" href="css/components/base/radarChart.css?v=2">
    <link rel="stylesheet" href="css/components/base/boxPlotChart.css?v=1">
    <link rel="stylesheet" href="css/components/base/timeSeriesChart.css?v=2">
    <link rel="stylesheet" href="css/components/base/tagFrequencyChart.css?v=1">
    <link rel="stylesheet" href="css/components/base/tagWordCloud.css?v=1">
</head>
<body>
    <!-- Top Navigation Header -->
    <div class="top-header">
        <a href="index.html" class="nav-link">Explore</a>
        <span class="nav-separator">|</span>
        <a href="test.html" class="nav-link">Test</a>
        <span class="nav-separator">|</span>
        <a href="analyze.html" class="nav-link active">Analyze</a>
    </div>

    <!-- Page Title Header -->
    <div class="page-title-header">
        <h1 class="page-title">Analyze Results</h1>
    </div>

    <!-- Main Layout -->
    <div class="layout">
        <!-- Left Sidebar -->
        <div class="analyze-sidebar">
            <div id="dataLoader"></div>
            <div id="patternList"></div>
        </div>

        <!-- Main Content Area -->
        <div class="analyze-main">
            <div class="analyze-main__placeholder" id="analyzePlaceholder">
                Load session data to begin analysis.
            </div>
            <div class="analyze-main__content" id="analyzeContent">
                <div id="summaryStats"></div>
                <div class="analyze-main__charts-grid">
                    <div class="analyze-main__chart-row">
                        <div class="analyze-main__chart-card analyze-main__chart-full">
                            <div id="timeSeriesChart"></div>
                        </div>
                    </div>
                    <div class="analyze-main__chart-row">
                        <div class="analyze-main__chart-card">
                            <div id="radarChart"></div>
                        </div>
                        <div class="analyze-main__chart-card">
                            <div id="boxPlotChart"></div>
                        </div>
                    </div>
                    <div class="analyze-main__chart-row">
                        <div class="analyze-main__chart-card">
                            <div id="tagFrequencyChart"></div>
                        </div>
                        <div class="analyze-main__chart-card">
                            <div id="tagWordCloud"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Plotly.js CDN -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>

    <!-- Module -->
    <script src="js/modules/analysisDataProcessor.js?v=2"></script>

    <!-- Components -->
    <script src="js/components/base/patternExplorer.js?v=2"></script>
    <script src="js/components/base/analysisDataLoader.js?v=2"></script>
    <script src="js/components/variants/patternExplorerForAnalysis.js?v=1"></script>
    <script src="js/components/base/summaryStats.js?v=1"></script>
    <script src="js/components/base/radarChart.js?v=3"></script>
    <script src="js/components/base/boxPlotChart.js?v=2"></script>
    <script src="js/components/base/timeSeriesChart.js?v=3"></script>
    <script src="js/components/base/tagFrequencyChart.js?v=1"></script>
    <script src="js/components/base/tagWordCloud.js?v=1"></script>

    <!-- Initialization Script -->
    <script>
        // Shared Plotly configuration
        const PLOTLY_FONT = "'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Courier New', monospace";
        const COMPARISON_COLORS = ['#333333', '#999999', '#cc0000', '#006699'];
        const BAND_COLORS = {
            delta: '#4a7eb5',
            theta: '#5bb5a2',
            alpha: '#d4a843',
            beta: '#d97a3e',
            gamma: '#c75b7a'
        };

        /**
         * Generate shades of a band color for comparison mode.
         * Returns array of N hex colors: [base, lighter, darker, lightest]
         */
        function getBandShades(hex, n) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const shades = [];
            // Offsets: 0 = base, then alternate lighter/darker
            const offsets = [0, 0.35, -0.25, 0.55];
            for (let i = 0; i < n; i++) {
                const off = offsets[i % offsets.length];
                const nr = Math.round(Math.min(255, Math.max(0, r + (255 - r) * Math.max(0, off) + r * Math.min(0, off))));
                const ng = Math.round(Math.min(255, Math.max(0, g + (255 - g) * Math.max(0, off) + g * Math.min(0, off))));
                const nb = Math.round(Math.min(255, Math.max(0, b + (255 - b) * Math.max(0, off) + b * Math.min(0, off))));
                shades.push('#' + [nr, ng, nb].map(c => c.toString(16).padStart(2, '0')).join(''));
            }
            return shades;
        }

        // State
        let dataProcessor = null;
        let dataLoader = null;
        let sidebar = null;
        let summaryStats = null;
        let radarChart = null;
        let boxPlotChart = null;
        let timeSeriesChart = null;
        let tagFrequencyChart = null;
        let tagWordCloud = null;

        // Audio preview
        let previewAudio = null;
        let previewingFilePath = null;

        // DOM references
        let analyzePlaceholder = null;
        let analyzeContent = null;

        function initializeComponents() {
            dataProcessor = new AnalysisDataProcessor();

            dataLoader = new AnalysisDataLoader({
                containerId: 'dataLoader',
                onSessionsLoaded: handleSessionsLoaded
            });

            sidebar = new PatternExplorerForAnalysis({
                containerId: 'patternList',
                onPatternSelect: handlePatternSelect,
                onComparisonChange: handleComparisonChange,
                onFilePreview: handleFilePreview
            });

            summaryStats = new SummaryStats({ containerId: 'summaryStats' });
            radarChart = new RadarChart({ containerId: 'radarChart' });
            boxPlotChart = new BoxPlotChart({ containerId: 'boxPlotChart' });
            timeSeriesChart = new TimeSeriesChart({ containerId: 'timeSeriesChart' });
            tagFrequencyChart = new TagFrequencyChart({ containerId: 'tagFrequencyChart' });
            tagWordCloud = new TagWordCloud({ containerId: 'tagWordCloud' });
        }

        function handleSessionsLoaded(sessions) {
            dataProcessor.loadSessions(sessions);
            const patterns = dataProcessor.getUniquePatterns();
            sidebar.setPatterns(patterns);

            if (patterns.length > 0) {
                sidebar.selectPattern(patterns[0].name);
            } else {
                showPlaceholder('No completed trials found in loaded data.');
            }
        }

        function handlePatternSelect(patternName) {
            if (!patternName) {
                showPlaceholder('Select a pattern to view its analysis.');
                return;
            }

            const analysis = dataProcessor.getPatternAnalysis(patternName);
            if (!analysis) {
                showPlaceholder('No data available for this pattern.');
                return;
            }

            showContent();
            summaryStats.update(analysis.summary);
            radarChart.update(analysis);
            boxPlotChart.update(analysis.boxPlots);
            timeSeriesChart.update(analysis.timeSeries);
            tagFrequencyChart.update(analysis.tagFrequency);
            tagWordCloud.update(analysis.tagFrequency);
        }

        function handleComparisonChange(patternNames) {
            if (patternNames.length < 2) {
                if (patternNames.length === 1) {
                    handlePatternSelect(patternNames[0]);
                }
                return;
            }

            showContent();
            const comparison = dataProcessor.getComparisonAnalysis(patternNames);
            summaryStats.clear();
            radarChart.updateComparison(comparison.patterns);
            boxPlotChart.updateComparison(comparison.patterns);
            timeSeriesChart.updateComparison(comparison.patterns);
            tagFrequencyChart.updateComparison(comparison.patterns);
            tagWordCloud.updateComparison(comparison.patterns);
        }

        function handleFilePreview(file) {
            if (previewAudio && previewingFilePath === file.path) {
                // Toggle pause/play
                if (previewAudio.paused) {
                    previewAudio.play();
                    sidebar.setPlayingState(file.path, true);
                } else {
                    previewAudio.pause();
                    sidebar.setPlayingState(file.path, false);
                }
                return;
            }

            // Stop previous
            if (previewAudio) {
                previewAudio.pause();
                previewAudio = null;
            }

            previewingFilePath = file.path;
            previewAudio = new Audio(file.path);
            previewAudio.play();
            sidebar.setPlayingState(file.path, true);

            previewAudio.addEventListener('ended', () => {
                sidebar.setPlayingState(file.path, false);
                previewingFilePath = null;
            });
        }

        function showPlaceholder(message) {
            analyzePlaceholder.textContent = message || 'Load session data to begin analysis.';
            analyzePlaceholder.style.display = 'flex';
            analyzeContent.classList.remove('active');
        }

        function showContent() {
            analyzePlaceholder.style.display = 'none';
            analyzeContent.classList.add('active');
        }

        // Resize handler for Plotly charts
        function handleResize() {
            if (analyzeContent.classList.contains('active')) {
                const plotDivs = analyzeContent.querySelectorAll('.js-plotly-plot');
                plotDivs.forEach(div => {
                    Plotly.Plots.resize(div);
                });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            analyzePlaceholder = document.getElementById('analyzePlaceholder');
            analyzeContent = document.getElementById('analyzeContent');
            initializeComponents();
            if (dataLoader && typeof dataLoader.loadFromDatabase === 'function') {
                dataLoader.loadFromDatabase();
            }
        });

        window.addEventListener('resize', handleResize);
    </script>
</body>
</html>
