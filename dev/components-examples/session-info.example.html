<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SessionInfo Component Example</title>
    <link rel="stylesheet" href="../../css/components/base/sessionInfo.css">
    <style>
        :root {
            --font-size-base: 13px;
            --font-size-sm: 11px;
            --font-weight-medium: 500;
            --font-weight-normal: 400;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Courier New', monospace;
            background: #fafafa;
            padding: var(--spacing-xl);
            font-size: var(--font-size-base);
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        
        h1 {
            margin-bottom: var(--spacing-lg);
            font-size: 16px;
            font-weight: var(--font-weight-medium);
        }
        
        #sessionInfo {
            height: 600px;
        }
        
        .output {
            margin-top: var(--spacing-lg);
            padding: var(--spacing-md);
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 2px;
            font-size: var(--font-size-sm);
        }
        
        .output h2 {
            font-size: var(--font-size-base);
            margin-bottom: var(--spacing-sm);
        }
        
        .output pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #666;
        }
        
        .controls {
            margin-top: var(--spacing-md);
            display: flex;
            gap: var(--spacing-sm);
        }
        
        button {
            padding: 6px var(--spacing-sm);
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 2px;
            cursor: pointer;
            font-size: var(--font-size-sm);
            font-family: inherit;
            color: #666;
            font-weight: 500;
            transition: background 0.15s ease, border-color 0.15s ease;
        }
        
        button:hover {
            background: #e8e8e8;
            border-color: #d0d0d0;
        }
        
        button:active {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SessionInfo Component Example</h1>
        
        <div id="sessionInfo"></div>
        
        <div class="controls">
            <button onclick="getData()">Get Data</button>
            <button onclick="resetForm()">Reset</button>
            <button onclick="setTestData()">Set Test Data</button>
            <button onclick="testStartSession()">Test START SESSION</button>
            <br>
            <small>Test pattern count:</small>
            <button onclick="updatePatternCount(0)">0</button>
            <button onclick="updatePatternCount(3)">3</button>
            <button onclick="updatePatternCount(5)">5</button>
            <button onclick="updatePatternCount(10)">10</button>
            <button onclick="updatePatternCount(20)">20</button>
        </div>
        
        <div class="output">
            <h2>Output</h2>
            <pre id="output">No changes yet...</pre>
        </div>
    </div>
    
    <script src="../../js/modules/sessionTimeEstimator.js"></script>
    <script src="../../js/components/base/sessionInfo.js"></script>
    <script>
        // Sample data
        const participants = [
            { participant_id: 1, participant_code: 'P001' },
            { participant_id: 2, participant_code: 'P002' },
            { participant_id: 3, participant_code: 'P003' }
        ];
        
        const locations = [
            { location_id: 1, name: 'Lab A' },
            { location_id: 2, name: 'Lab B' },
            { location_id: 3, name: 'Field Site 1' }
        ];
        
        // Initialize time estimator
        // Option 1: Load from config file (async) - uncomment to use:
        // (async () => {
        //     const timeEstimator = await SessionTimeEstimator.create('../../js/modules/sessionTimingConfig.json');
        //     // ... rest of initialization
        // })();
        
        // Option 2: Use defaults or override specific values
        // Edit js/modules/sessionTimingConfig.json to change default values
        const timeEstimator = new SessionTimeEstimator({
            // Values can be overridden here, or edit sessionTimingConfig.json
            // calibrationDuration: 60,
            // baselineDuration: 30,
            // stimulationDuration: 30,
            // taggingDuration: 10
        });
        
        // Initialize SessionInfo
        const sessionInfo = new SessionInfo({
            containerId: 'sessionInfo',
            participants: participants,
            locations: locations,
            timeEstimator: timeEstimator,
            onChange: (change) => {
                const output = document.getElementById('output');
                output.textContent = JSON.stringify({
                    field: change.field,
                    value: change.value,
                    isValid: change.isValid,
                    allData: change.data
                }, null, 2);
            },
            onValidationChange: (isValid, data) => {
                console.log('Validation changed:', isValid, data);
            },
            onStartSession: (sessionData) => {
                const output = document.getElementById('output');
                output.textContent = 'SESSION STARTED!\n\n' + JSON.stringify({
                    sessionId: sessionData.sessionId,
                    data: sessionData.data
                }, null, 2);
                alert(`Session ${sessionData.sessionId} started!`);
            }
        });
        
        // Helper functions
        function getData() {
            const data = sessionInfo.getData();
            const isValid = sessionInfo.validate();
            const output = document.getElementById('output');
            output.textContent = JSON.stringify({
                data: data,
                isValid: isValid
            }, null, 2);
        }
        
        function resetForm() {
            sessionInfo.reset();
            const output = document.getElementById('output');
            output.textContent = 'Form reset';
        }
        
        function setTestData() {
            sessionInfo.setData({
                participant_id: 2,
                location_id: 1,
                equipment_info: 'EEG Headset v2.0',
                experimenter: 'Dr. Smith',
                notes: 'Test session for pattern validation'
            });
            const output = document.getElementById('output');
            output.textContent = 'Test data set (note: session_date will be set when START SESSION is clicked)';
        }
        
        function testStartSession() {
            if (sessionInfo.validate()) {
                sessionInfo.startSession();
            } else {
                alert('Please fill in required fields (Participant and Location)');
            }
        }
        
        // Test updating pattern count
        function updatePatternCount(count) {
            sessionInfo.updateSessionEstimate(count);
            const output = document.getElementById('output');
            output.textContent = `Updated pattern count to ${count}`;
        }
        
        // Simulate pattern count changes
        setTimeout(() => updatePatternCount(5), 1000);
        setTimeout(() => updatePatternCount(10), 3000);
        setTimeout(() => updatePatternCount(3), 5000);
    </script>
</body>
</html>
