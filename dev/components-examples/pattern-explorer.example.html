<!DOCTYPE html>
<html>
<head>
    <title>PatternExplorer Component Example</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
        }
        #fileList {
            width: 300px;
            border: 1px solid #ccc;
            padding: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        .file-item {
            padding: 8px;
            margin: 2px 0;
            cursor: pointer;
            background: #f5f5f5;
        }
        .file-item:hover {
            background: #e0e0e0;
        }
        .file-item.active {
            background: #000;
            color: #fff;
        }
        .file-tooltip {
            position: fixed;
            background: #333;
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            pointer-events: none;
            z-index: 10000;
            visibility: hidden;
        }
        .file-tooltip.show {
            visibility: visible;
        }
    </style>
</head>
<body>
    <h1>PatternExplorer Component Example</h1>
    <div id="fileList"></div>
    
    <script src="../../js/components/base/patternExplorer.js"></script>
    <script>
        // Example usage
        const patternExplorer = new PatternExplorer({
            containerId: 'fileList',
            metadata: {
                'A_100_1.mp3': {
                    rms_mean: 0.123,
                    duration: 5.5,
                    stereo_balance: 0.0,
                    stereo_movement: 0.1
                }
            },
            onFileClick: (file) => {
                console.log('File clicked:', file);
            }
        });
        
        // Render some test files
        const testFiles = [
            { name: 'A_100_1.mp3', path: '../../audio_files/A_100_1.mp3' },
            { name: 'A_100_2.mp3', path: '../../audio_files/A_100_2.mp3' },
            { name: 'test.mp3', path: '../../audio_files/test.mp3' }
        ];
        
        patternExplorer.render(testFiles);
    </script>
</body>
</html>
