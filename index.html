<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIL Pattern Library</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Mode Navigation Header -->
    <header class="mode-header">
        <div class="mode-header-title">SAIL TESTING APP</div>
        <nav class="mode-nav">
            <button id="nav-library" data-mode="library" class="active">LIBRARY</button>
            <button id="nav-test" data-mode="test">TEST</button>
            <button id="nav-analysis" data-mode="analysis">ANALYSIS</button>
        </nav>
    </header>
    
    <!-- Library Mode Container -->
    <div id="library-mode" class="mode-container library-mode active">
        <div class="sidebar">
        <h1>SAIL Pattern Library</h1>
        <h2>v1.0</h2>
        <div id="filters">
            <div class="filter-group" style="margin-bottom: 12px;">
                <input type="text" id="searchBox" placeholder="Search files..." style="width: 100%; padding: 6px 8px; border: 1px solid #e0e0e0; border-radius: 2px; font-size: 13px; font-family: inherit; color: #333; background: #fff;">
            </div>
            <div class="filter-group">
                <label class="filter-label" data-tooltip="RMS Mean: Average Root Mean Square amplitude. Measures overall loudness/intensity of the audio. Higher values indicate louder audio." style="display: block; font-size: 11px; color: #666; margin-bottom: 4px; cursor: pointer; position: relative;">RMS <span id="rms_display" style="color: #999; font-weight: normal; font-size: 11px;">(0.003-0.555)</span></label>
                <div class="dual-slider" id="rms_slider" data-min="0.003231" data-max="0.554765" data-step="0.001">
                    <div class="slider-track"></div>
                    <div class="slider-handle slider-handle-min" data-handle="min"></div>
                    <div class="slider-handle slider-handle-max" data-handle="max"></div>
                    <div class="slider-range"></div>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label" data-tooltip="Duration: Length of the audio file in seconds." style="display: block; font-size: 11px; color: #666; margin-bottom: 4px; cursor: pointer; position: relative;">Duration <span id="duration_display" style="color: #999; font-weight: normal; font-size: 11px;">(1.5-35.3s)</span></label>
                <div class="dual-slider" id="duration_slider" data-min="1.49" data-max="35.29" data-step="0.1">
                    <div class="slider-track"></div>
                    <div class="slider-handle slider-handle-min" data-handle="min"></div>
                    <div class="slider-handle slider-handle-max" data-handle="max"></div>
                    <div class="slider-range"></div>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label" data-tooltip="Stereo Balance: Left/right channel balance. Range: -1.0 (fully left) to 1.0 (fully right). 0.0 = centered/mono." style="display: block; font-size: 11px; color: #666; margin-bottom: 4px; cursor: pointer; position: relative;">Balance <span id="balance_display" style="color: #999; font-weight: normal; font-size: 11px;">(-1.0-1.0)</span></label>
                <div class="dual-slider" id="balance_slider" data-min="-1.0" data-max="1.0" data-step="0.01">
                    <div class="slider-track"></div>
                    <div class="slider-handle slider-handle-min" data-handle="min"></div>
                    <div class="slider-handle slider-handle-max" data-handle="max"></div>
                    <div class="slider-range"></div>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label" data-tooltip="Stereo Movement: How much the stereo field changes over time. Range: 0.0 (no movement) to ~0.86 (high movement). Measures variance in stereo positioning." style="display: block; font-size: 11px; color: #666; margin-bottom: 4px; cursor: pointer; position: relative;">Movement <span id="movement_display" style="color: #999; font-weight: normal; font-size: 11px;">(0.0-0.86)</span></label>
                <div class="dual-slider" id="movement_slider" data-min="0.0" data-max="0.8556" data-step="0.01">
                    <div class="slider-track"></div>
                    <div class="slider-handle slider-handle-min" data-handle="min"></div>
                    <div class="slider-handle slider-handle-max" data-handle="max"></div>
                    <div class="slider-range"></div>
                </div>
            </div>
            <button id="resetFilters" style="margin-top: 8px; width: 100%; padding: 4px; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 2px; cursor: pointer; font-size: 12px; font-family: inherit; color: #666;">RESET</button>
        </div>
        <div id="fileList">Loading files...</div>
    </div>
    
    <div class="main">
        <div class="controls">
            <button id="playBtn">▶</button>
            <button id="pauseBtn" style="display: none;">⏸</button>
            <button id="stopBtn">⏹</button>
            <button id="loopBtn" class="toggle-btn active">LOOP</button>
            <button id="manualTestBtn" class="toggle-btn">MANUAL TEST</button>
            <select id="vizMode" class="viz-selector">
                <option value="waveform">Waveform</option>
                <option value="intensity">Intensity Bars</option>
                <option value="stereo">Stereo Field</option>
                <option value="spectrum">Frequency Spectrum</option>
                <option value="pulses">Directional Pulses</option>
                <option value="blob">Liquid Blob</option>
                <option value="particles">Particle Swarm</option>
                <option value="landscape">Frequency Terrain</option>
            </select>
        </div>
        <div class="visualization">
            <div id="p5-container"></div>
        </div>
        
        <!-- Test overlay -->
        <div id="testOverlay" class="test-overlay">
            <div class="test-overlay-content">
                <div class="phase" id="testPhase">Baselining...</div>
                <div class="countdown" id="testCountdown">30s</div>
            </div>
        </div>
    </div>
    
    <!-- Test Mode Container -->
    <div id="test-mode" class="mode-container test-mode">
        <div class="sidebar">
            <h1>Test Mode</h1>
            <h2>File Manager</h2>
            <div id="filters-test">
                <div class="filter-group" style="margin-bottom: 12px;">
                    <input type="text" id="searchBox-test" placeholder="Search files..." style="width: 100%; padding: 6px 8px; border: 1px solid #e0e0e0; border-radius: 2px; font-size: 13px; font-family: inherit; color: #333; background: #fff;">
                </div>
                <div class="filter-group">
                    <label class="filter-label" data-tooltip="RMS Mean: Average Root Mean Square amplitude. Measures overall loudness/intensity of the audio. Higher values indicate louder audio." style="display: block; font-size: 11px; color: #666; margin-bottom: 4px; cursor: pointer; position: relative;">RMS <span id="rms_display-test" style="color: #999; font-weight: normal; font-size: 11px;">(0.003-0.555)</span></label>
                    <div class="dual-slider" id="rms_slider-test" data-min="0.003231" data-max="0.554765" data-step="0.001">
                        <div class="slider-track"></div>
                        <div class="slider-handle slider-handle-min" data-handle="min"></div>
                        <div class="slider-handle slider-handle-max" data-handle="max"></div>
                        <div class="slider-range"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label" data-tooltip="Duration: Length of the audio file in seconds." style="display: block; font-size: 11px; color: #666; margin-bottom: 4px; cursor: pointer; position: relative;">Duration <span id="duration_display-test" style="color: #999; font-weight: normal; font-size: 11px;">(1.5-35.3s)</span></label>
                    <div class="dual-slider" id="duration_slider-test" data-min="1.49" data-max="35.29" data-step="0.1">
                        <div class="slider-track"></div>
                        <div class="slider-handle slider-handle-min" data-handle="min"></div>
                        <div class="slider-handle slider-handle-max" data-handle="max"></div>
                        <div class="slider-range"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label" data-tooltip="Stereo Balance: Left/right channel balance. Range: -1.0 (fully left) to 1.0 (fully right). 0.0 = centered/mono." style="display: block; font-size: 11px; color: #666; margin-bottom: 4px; cursor: pointer; position: relative;">Balance <span id="balance_display-test" style="color: #999; font-weight: normal; font-size: 11px;">(-1.0-1.0)</span></label>
                    <div class="dual-slider" id="balance_slider-test" data-min="-1.0" data-max="1.0" data-step="0.01">
                        <div class="slider-track"></div>
                        <div class="slider-handle slider-handle-min" data-handle="min"></div>
                        <div class="slider-handle slider-handle-max" data-handle="max"></div>
                        <div class="slider-range"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label" data-tooltip="Stereo Movement: How much the stereo field changes over time. Range: 0.0 (no movement) to ~0.86 (high movement). Measures variance in stereo positioning." style="display: block; font-size: 11px; color: #666; margin-bottom: 4px; cursor: pointer; position: relative;">Movement <span id="movement_display-test" style="color: #999; font-weight: normal; font-size: 11px;">(0.0-0.86)</span></label>
                    <div class="dual-slider" id="movement_slider-test" data-min="0.0" data-max="0.8556" data-step="0.01">
                        <div class="slider-track"></div>
                        <div class="slider-handle slider-handle-min" data-handle="min"></div>
                        <div class="slider-handle slider-handle-max" data-handle="max"></div>
                        <div class="slider-range"></div>
                    </div>
                </div>
                <button id="resetFilters-test" style="margin-top: 8px; width: 100%; padding: 4px; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 2px; cursor: pointer; font-size: 12px; font-family: inherit; color: #666;">RESET</button>
            </div>
            <div id="fileList-test">Loading files...</div>
        </div>
        
        <div class="main">
            <div class="controls">
                <h2 style="font-size: 14px; font-weight: 500; margin-right: auto;">Test Queue</h2>
                <button id="startSessionBtn" class="toggle-btn">START SESSION</button>
                <button id="endSessionBtn" class="toggle-btn" style="display: none;">END SESSION</button>
            </div>
            <div class="visualization" style="padding: 20px;">
                <div id="testQueue" style="background: #fafafa; border: 1px solid #e0e0e0; border-radius: 4px; padding: 16px; min-height: 200px;">
                    <p style="color: #999; font-size: 12px; margin-bottom: 12px;">Test Queue (drag files from sidebar or click to add)</p>
                    <div id="testQueueList" style="min-height: 100px;">
                        <p style="color: #ccc; font-size: 11px; text-align: center; padding: 40px;">No files in queue</p>
                    </div>
                </div>
                <div style="margin-top: 20px; padding: 16px; background: #fff; border: 1px solid #e0e0e0; border-radius: 4px;">
                    <h3 style="font-size: 12px; font-weight: 500; margin-bottom: 12px;">Session Info</h3>
                    <div id="sessionInfo" style="font-size: 11px; color: #666;">
                        <p>No active session</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Analysis Mode Container -->
    <div id="analysis-mode" class="mode-container analysis-mode">
        <div style="flex: 1; display: flex; align-items: center; justify-content: center; background: #fafafa;">
            <div style="text-align: center; color: #999;">
                <h2 style="font-size: 18px; font-weight: 400; margin-bottom: 8px;">Analysis Mode</h2>
                <p style="font-size: 12px;">Coming soon...</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/addons/p5.sound.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
