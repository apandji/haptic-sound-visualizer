<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIL Pattern Library</title>
    <style>
        /* Typography & Spacing System */
        :root {
            /* Typography Scale */
            --font-size-xs: 10px;
            --font-size-sm: 11px;
            --font-size-base: 13px;
            --font-size-md: 14px;
            --font-size-lg: 16px;
            
            /* Font Weights */
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            
            /* Line Heights */
            --line-height-tight: 1.2;
            --line-height-normal: 1.5;
            --line-height-relaxed: 1.75;
            
            /* Spacing Scale (4px base unit) */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-2xl: 24px;
            --spacing-3xl: 32px;
            
            /* Component Padding */
            --padding-component: var(--spacing-md);
            --padding-component-lg: var(--spacing-lg);
            --padding-component-xl: var(--spacing-xl);
            
            /* Component Gaps */
            --gap-sm: var(--spacing-sm);
            --gap-md: var(--spacing-md);
            --gap-lg: var(--spacing-lg);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Courier New', monospace;
            background: #fafafa;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: var(--font-size-base);
            line-height: var(--line-height-normal);
            overflow: hidden;
        }
        
        /* Top Navigation Header */
        .top-header {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: var(--spacing-md) var(--spacing-xl);
            display: flex;
            align-items: center;
            gap: var(--spacing-xl);
            flex-shrink: 0;
            z-index: 1000;
        }
        
        .nav-link {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: #666;
            text-decoration: none;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.15s ease;
            cursor: pointer;
        }
        
        .nav-link:hover {
            color: #000;
        }
        
        .nav-link.active {
            color: #000;
        }
        
        .nav-separator {
            color: #e0e0e0;
            font-size: var(--font-size-sm);
        }
        
        /* Page Title Header */
        .page-title-header {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: var(--spacing-lg) var(--spacing-xl);
            flex-shrink: 0;
        }
        
        .page-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            color: #000;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        /* Main Layout Container */
        .layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }
        
        /* Sidebar - Fixed to Left */
        .sidebar {
            width: 250px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            flex-shrink: 0;
            padding: 0; /* Remove padding - components handle their own spacing */
            position: relative;
            z-index: 1; /* Below sticky wrapper */
        }
        
        /* Main Content Area */
        .main-content {
            flex: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        /* Placeholder when no file selected */
        .main-content__placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: var(--font-size-sm);
        }
        
        .main-content__placeholder.hidden {
            display: none;
        }
        
        /* Visualizer container */
        .main-content__visualizer {
            display: none;
            flex-direction: column;
            background: #fafafa;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .main-content__visualizer.active {
            display: flex;
        }
        
        .main-content__visualizer #audioControlsContainer {
            flex-shrink: 0;
        }
        
        .main-content__visualizer #p5-container {
            flex: 1;
            width: 100%;
            min-height: 0;
        }
    </style>
    
    <!-- Component CSS -->
    <link rel="stylesheet" href="css/components/base/patternExplorer.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/filterPanel.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/dualSlider.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/visualizer.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/audioControls.css?v=2026-02-26.1">
</head>
<body>
    <!-- Top Navigation Header -->
    <div class="top-header">
        <a href="index.html" class="nav-link active">Explore</a>
        <span class="nav-separator">|</span>
        <a href="test.html" class="nav-link">Test</a>
        <span class="nav-separator">|</span>
        <a href="analyze.html" class="nav-link">Analyze</a>
    </div>
    
    <!-- Page Title Header -->
    <div class="page-title-header">
        <h1 class="page-title">Preview Patterns</h1>
    </div>
    
    <!-- Main Layout -->
    <div class="layout">
        <!-- Sidebar with PatternExplorerWithFilters -->
        <div class="sidebar">
            <!-- The component will reorganize these containers into its own structure -->
            <!-- Order: filterPanel first, then fileList (component will create sticky wrapper) -->
            <div id="filterPanel"></div>
            <div id="fileList">Loading files...</div>
        </div>
        
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Placeholder when no file selected -->
                <div class="main-content__placeholder" id="mainPlaceholder">
                Select a pattern to preview.
            </div>
            
            <!-- Visualizer (shown when file is playing) -->
            <div class="main-content__visualizer" id="visualizerContainer">
                <div id="audioControlsContainer"></div>
                <div id="p5-container"></div>
            </div>
        </div>
    </div>
    
    <!-- p5.js dependencies (for visualizer) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    
    <!-- Component JavaScript -->
    <script src="js/modules/filters.js?v=2026-02-26.1"></script>
    <script src="js/modules/audioPlayer.js?v=2026-02-26.1"></script>
    <script src="js/components/base/patternExplorer.js?v=2026-02-26.1"></script>
    <script src="js/components/base/filterPanel.js?v=2026-02-26.1"></script>
    <script src="js/components/base/dualSlider.js?v=2026-02-26.1"></script>
    <script src="js/components/base/visualizer.js?v=2026-02-26.1"></script>
    <script src="js/components/base/audioControls.js?v=2026-02-26.1"></script>
    <script src="js/components/variants/patternExplorerWithFilters.js?v=2026-02-26.1"></script>
    
    <!-- Page Script -->
    <script src="js/app/state.js?v=2026-02-26.1"></script>
    <script src="js/app/audioLifecycle.js?v=2026-02-26.1"></script>
    <script src="js/app/explorer.js?v=2026-02-26.1"></script>
    <script src="js/app/dataLoaders.js?v=2026-02-26.1"></script>
    <script src="js/app/bootstrap.js?v=2026-02-26.1"></script>
</body>
</html>
