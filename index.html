<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIL Pattern Library</title>
    <!-- Page CSS -->
    <link rel="stylesheet" href="css/pages/index.css?v=2026-02-26.1">
    
    <!-- Design tokens (load first) -->
    <link rel="stylesheet" href="css/tokens/colors.css">
    
    <!-- Component CSS -->
    <link rel="stylesheet" href="css/components/base/patternExplorer.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/filterPanel.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/dualSlider.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/visualizer.css?v=2026-02-26.1">
    <link rel="stylesheet" href="css/components/base/audioControls.css?v=2026-02-26.1">
</head>
<body>
    <!-- Top Navigation Header -->
    <div class="top-header">
        <a href="index.html" class="nav-link active">Explore</a>
        <span class="nav-separator">|</span>
        <a href="test.html" class="nav-link">Test</a>
        <span class="nav-separator">|</span>
        <a href="analyze.html" class="nav-link">Analyze</a>
    </div>
    
    <!-- Page Title Header -->
    <div class="page-title-header">
        <h1 class="page-title">Preview Patterns</h1>
    </div>
    
    <!-- Main Layout -->
    <div class="layout">
        <!-- Sidebar with PatternExplorerWithFilters -->
        <div class="sidebar">
            <!-- The component will reorganize these containers into its own structure -->
            <!-- Order: filterPanel first, then fileList (component will create sticky wrapper) -->
            <div id="filterPanel"></div>
            <div id="fileList">Loading files...</div>
        </div>
        
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Placeholder when no file selected -->
                <div class="main-content__placeholder" id="mainPlaceholder">
                Select a pattern to preview.
            </div>
            
            <!-- Visualizer (shown when file is playing) -->
            <div class="main-content__visualizer" id="visualizerContainer">
                <div id="audioControlsContainer"></div>
                <div id="p5-container"></div>
            </div>
        </div>
    </div>
    
    <!-- p5.js dependencies (for visualizer) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    
    <!-- Component JavaScript -->
    <script src="js/modules/filters.js?v=2026-02-26.1"></script>
    <script src="js/modules/audioPlayer.js?v=2026-02-26.1"></script>
    <script src="js/components/base/patternExplorer.js?v=2026-02-26.1"></script>
    <script src="js/components/base/filterPanel.js?v=2026-02-26.1"></script>
    <script src="js/components/base/dualSlider.js?v=2026-02-26.1"></script>
    <script src="js/components/base/visualizer.js?v=2026-02-26.1"></script>
    <script src="js/components/base/audioControls.js?v=2026-02-26.1"></script>
    <script src="js/components/variants/patternExplorerWithFilters.js?v=2026-02-26.1"></script>
    
    <!-- Page Script -->
    <script src="js/app/state.js?v=2026-02-26.1"></script>
    <script src="js/app/audioLifecycle.js?v=2026-02-26.1"></script>
    <script src="js/app/explorer.js?v=2026-02-26.1"></script>
    <script src="js/app/dataLoaders.js?v=2026-02-26.1"></script>
    <script src="js/app/bootstrap.js?v=2026-02-26.1"></script>
</body>
</html>
