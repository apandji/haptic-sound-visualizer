<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIL Pattern Library</title>
    <style>
        /* Typography & Spacing System */
        :root {
            /* Typography Scale */
            --font-size-xs: 10px;
            --font-size-sm: 11px;
            --font-size-base: 13px;
            --font-size-md: 14px;
            --font-size-lg: 16px;
            
            /* Font Weights */
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            
            /* Line Heights */
            --line-height-tight: 1.2;
            --line-height-normal: 1.5;
            --line-height-relaxed: 1.75;
            
            /* Spacing Scale (4px base unit) */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-2xl: 24px;
            --spacing-3xl: 32px;
            
            /* Component Padding */
            --padding-component: var(--spacing-md);
            --padding-component-lg: var(--spacing-lg);
            --padding-component-xl: var(--spacing-xl);
            
            /* Component Gaps */
            --gap-sm: var(--spacing-sm);
            --gap-md: var(--spacing-md);
            --gap-lg: var(--spacing-lg);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', 'Courier New', monospace;
            background: #fafafa;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: var(--font-size-base);
            line-height: var(--line-height-normal);
            overflow: hidden;
        }
        
        /* Top Navigation Header */
        .top-header {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: var(--spacing-md) var(--spacing-xl);
            display: flex;
            align-items: center;
            gap: var(--spacing-xl);
            flex-shrink: 0;
            z-index: 1000;
        }
        
        .nav-link {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: #666;
            text-decoration: none;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.15s ease;
            cursor: pointer;
        }
        
        .nav-link:hover {
            color: #000;
        }
        
        .nav-link.active {
            color: #000;
        }
        
        .nav-separator {
            color: #e0e0e0;
            font-size: var(--font-size-sm);
        }
        
        /* Page Title Header */
        .page-title-header {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: var(--spacing-lg) var(--spacing-xl);
            flex-shrink: 0;
        }
        
        .page-title {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-semibold);
            color: #000;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        /* Main Layout Container */
        .layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }
        
        /* Sidebar - Fixed to Left */
        .sidebar {
            width: 250px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            flex-shrink: 0;
            padding: 0; /* Remove padding - components handle their own spacing */
            position: relative;
            z-index: 1; /* Below sticky wrapper */
        }
        
        /* Main Content Area */
        .main-content {
            flex: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        /* Placeholder when no file selected */
        .main-content__placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: var(--font-size-sm);
        }
        
        .main-content__placeholder.hidden {
            display: none;
        }
        
        /* Visualizer container */
        .main-content__visualizer {
            display: none;
            flex-direction: column;
            background: #fafafa;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .main-content__visualizer.active {
            display: flex;
        }
        
        .main-content__visualizer #audioControlsContainer {
            flex-shrink: 0;
        }
        
        .main-content__visualizer #p5-container {
            flex: 1;
            width: 100%;
            min-height: 0;
        }
    </style>
    
    <!-- Component CSS -->
    <link rel="stylesheet" href="css/components/base/patternExplorer.css?v=7">
    <link rel="stylesheet" href="css/components/base/filterPanel.css?v=7">
    <link rel="stylesheet" href="css/components/base/dualSlider.css?v=7">
    <link rel="stylesheet" href="css/components/base/visualizer.css?v=2">
    <link rel="stylesheet" href="css/components/base/audioControls.css?v=1">
</head>
<body>
    <!-- Top Navigation Header -->
    <div class="top-header">
        <a href="index.html" class="nav-link active">Explore</a>
        <span class="nav-separator">|</span>
        <a href="test.html" class="nav-link">Test</a>
        <span class="nav-separator">|</span>
        <a href="#" class="nav-link">Analyze</a>
    </div>
    
    <!-- Page Title Header -->
    <div class="page-title-header">
        <h1 class="page-title">Preview Patterns</h1>
    </div>
    
    <!-- Main Layout -->
    <div class="layout">
        <!-- Sidebar with PatternExplorerWithFilters -->
        <div class="sidebar">
            <!-- The component will reorganize these containers into its own structure -->
            <!-- Order: filterPanel first, then fileList (component will create sticky wrapper) -->
            <div id="filterPanel"></div>
            <div id="fileList">Loading files...</div>
        </div>
        
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Placeholder when no file selected -->
                <div class="main-content__placeholder" id="mainPlaceholder">
                Select a pattern to preview.
            </div>
            
            <!-- Visualizer (shown when file is playing) -->
            <div class="main-content__visualizer" id="visualizerContainer">
                <div id="audioControlsContainer"></div>
                <div id="p5-container"></div>
            </div>
        </div>
    </div>
    
    <!-- p5.js dependencies (for visualizer) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/addons/p5.sound.min.js"></script>
    
    <!-- Component JavaScript -->
    <script src="js/modules/filters.js?v=2"></script>
    <script src="js/modules/audioPlayer.js?v=2"></script>
    <script src="js/components/base/patternExplorer.js?v=2"></script>
    <script src="js/components/base/filterPanel.js?v=2"></script>
    <script src="js/components/base/dualSlider.js?v=2"></script>
    <script src="js/components/base/visualizer.js?v=14"></script>
    <script src="js/components/base/audioControls.js?v=1"></script>
    <script src="js/components/variants/patternExplorerWithFilters.js?v=2"></script>
    
    <!-- Initialization Script -->
    <script>
        let allFilesList = [];
        let patternMetadata = {};
        
        // Audio/Visualization state
        let visualizer = null;
        let audioPlayer = null;
        let audioControls = null;
        let patternExplorer = null;
        let currentFilePath = null;
        
        // DOM elements (set after DOM loads)
        let mainPlaceholder = null;
        let visualizerContainer = null;
        
        // Initialize Visualizer (called when visualizer container becomes visible)
        let visualizerInitRetries = 0;
        const MAX_VISUALIZER_RETRIES = 30; // ~500ms max wait
        
        function initializeVisualizer() {
            if (visualizer) return;
            
            const container = document.getElementById('p5-container');
            if (!container) return;
            
            // Wait for container to have dimensions (with retry limit)
            const rect = container.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) {
                visualizerInitRetries++;
                if (visualizerInitRetries < MAX_VISUALIZER_RETRIES) {
                    requestAnimationFrame(initializeVisualizer);
                } else {
                    console.error('Visualizer container has no dimensions');
                    visualizerInitRetries = 0;
                }
                return;
            }
            
            visualizerInitRetries = 0;
            visualizer = new Visualizer({
                containerId: 'p5-container',
                defaultMode: 'waveform',
                onReady: (loadSoundFn) => {
                    initializeAudioPlayer(loadSoundFn);
                }
            });
        }
        
        // Load pattern metadata
        async function loadPatternMetadata() {
            try {
                const response = await fetch('pattern_metadata.json');
                if (response.ok) {
                    const data = await response.json();
                    if (data.patterns && Array.isArray(data.patterns)) {
                        patternMetadata = {};
                        data.patterns.forEach(pattern => {
                            patternMetadata[pattern.filename] = pattern;
                        });
                        console.log('Loaded metadata for', Object.keys(patternMetadata).length, 'patterns');
                    }
                }
            } catch (error) {
                console.warn('Could not load pattern metadata:', error);
            }
        }
        
        // Load file list from server or static JSON file
        async function loadFileList() {
            // Try API endpoint first (for local development)
            try {
                const apiResponse = await fetch('/api/list-audio-files');
                if (apiResponse.ok) {
                    const contentType = apiResponse.headers.get('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        const data = await apiResponse.json();
                        if (Array.isArray(data)) {
                            allFilesList = data;
                            console.log('Loaded', allFilesList.length, 'files from API');
                            initializeComponent();
                            return;
                        }
                    }
                }
            } catch (apiError) {
                console.log('API endpoint not available:', apiError.message);
            }
            
            // Fallback to static JSON file (for GitHub Pages)
            const basePath = window.location.pathname.replace(/\/[^/]*$/, '') || '';
            const jsonPaths = [
                basePath + '/audio-files.json',
                './audio-files.json',
                'audio-files.json',
                '/audio-files.json'
            ];
            
            for (const path of jsonPaths) {
                try {
                    console.log('Trying to load from:', path);
                    const response = await fetch(path);
                    
                    if (!response.ok) {
                        console.log('Response not OK, status:', response.status, 'for path:', path);
                        continue;
                    }
                    
                    const contentType = response.headers.get('content-type') || '';
                    const text = await response.text();
                    
                    const isJson = contentType.includes('application/json') || 
                                  contentType.includes('text/json') ||
                                  text.trim().startsWith('[') || 
                                  text.trim().startsWith('{');
                    
                    if (!isJson) {
                        console.log('Response does not appear to be JSON, starts with:', text.substring(0, 50));
                        continue;
                    }
                    
                    const data = JSON.parse(text);
                    if (Array.isArray(data) && data.length > 0) {
                        allFilesList = data;
                        console.log('Successfully loaded', allFilesList.length, 'files from:', path);
                        initializeComponent();
                        return;
                    }
                } catch (fetchError) {
                    console.log('Error loading from', path, ':', fetchError.message);
                    continue;
                }
            }
            
            // If we get here, all attempts failed
            console.error('Failed to load audio files from any source');
            const fileListEl = document.getElementById('fileList');
            if (fileListEl) {
                fileListEl.innerHTML = '<div style="padding: 20px; color: #999; font-size: 12px;">Failed to load audio files</div>';
            }
        }
        
        
        // Initialize AudioPlayer (called after Visualizer is ready)
        function initializeAudioPlayer(loadSoundFn) {
            if (audioPlayer) return; // Already initialized
            
            audioPlayer = new AudioPlayer({
                loadSoundFn: loadSoundFn,
                defaultLoop: true,
                onPlay: () => {
                    updatePlayState(true);
                },
                onPause: () => {
                    updatePlayState(false);
                },
                onStop: () => {
                    updatePlayState(false);
                },
                onEnd: () => {
                    updatePlayState(false);
                }
            });
            
            // Set AudioPlayer reference in Visualizer
            visualizer.setAudioPlayer(audioPlayer);
            
            // Initialize AudioControls
            initializeAudioControls();
        }
        
        // Initialize AudioControls (called after AudioPlayer is ready)
        function initializeAudioControls() {
            if (audioControls) return; // Already initialized
            
            audioControls = new AudioControls({
                containerId: 'audioControlsContainer',
                audioPlayer: audioPlayer,
                visualizer: visualizer,
                defaultLoopMode: 'loop',
                defaultMode: 'waveform',
                onLoopModeChange: (mode, duration) => {
                    console.log('Loop mode changed:', mode);
                },
                onModeChange: (mode) => {
                    console.log('Visualization mode changed:', mode);
                },
                onStop: () => {
                    // Stop also unloads current file
                    unloadCurrentFile();
                },
                onPlayPause: (isPlaying) => {
                    // Sync with PatternExplorer
                    updatePlayState(isPlaying);
                }
            });
        }
        
        // Update play state in PatternExplorer and AudioControls
        function updatePlayState(isPlaying) {
            if (patternExplorer && patternExplorer.patternExplorer) {
                patternExplorer.patternExplorer.setPlayingFile(currentFilePath, isPlaying);
            }
            if (audioControls && typeof audioControls.updatePlayPauseState === 'function') {
                audioControls.updatePlayPauseState(isPlaying);
            }
        }
        
        // Show visualizer, hide placeholder
        function showVisualizer() {
            mainPlaceholder.classList.add('hidden');
            visualizerContainer.classList.add('active');
        }
        
        // Hide visualizer, show placeholder
        function hideVisualizer() {
            mainPlaceholder.classList.remove('hidden');
            visualizerContainer.classList.remove('active');
        }
        
        // Load and play a file
        function loadAndPlayFile(file) {
            // Keep original path for PatternExplorer matching
            const originalPath = file.path || `audio_files/${file.name}`;
            
            // URL path for audio loading (relative path for GitHub Pages compatibility)
            let audioUrl = originalPath;
            // Remove leading slash if present to keep path relative
            if (audioUrl.startsWith('/')) {
                audioUrl = audioUrl.substring(1);
            }
            
            // Show visualizer FIRST (so container has dimensions for p5.js)
            showVisualizer();
            
            // Set active file in PatternExplorer (use original path format)
            if (patternExplorer && patternExplorer.patternExplorer) {
                patternExplorer.patternExplorer.setActiveFile(originalPath);
            }
            
            // Set currentFilePath immediately for UI state
            currentFilePath = originalPath;
            
            // Start audio context during user gesture (critical for browser autoplay policy)
            if (typeof userStartAudio === 'function') {
                userStartAudio().catch(() => {});
            }
            
            // Initialize visualizer if not already done
            if (!visualizer) {
                initializeVisualizer();
            }
            
            // Wait for audioPlayer to be ready, then load and play
            let loadRetries = 0;
            const MAX_LOAD_RETRIES = 60; // 3 seconds max wait
            
            const tryLoadAndPlay = () => {
                if (!audioPlayer) {
                    loadRetries++;
                    if (loadRetries < MAX_LOAD_RETRIES) {
                        setTimeout(tryLoadAndPlay, 50);
                    } else {
                        console.error('AudioPlayer not ready');
                        hideVisualizer();
                    }
                    return;
                }
                
                // Ensure audio context is started
                const startContext = visualizer 
                    ? visualizer.ensureAudioContextStarted() 
                    : Promise.resolve(true);
                
                startContext.then(() => {
                    return audioPlayer.loadFile(audioUrl);
                }).then(() => {
                    audioPlayer.play();
                }).catch(error => {
                    console.error('Error loading file:', error);
                    currentFilePath = null;
                    hideVisualizer();
                    if (patternExplorer && patternExplorer.patternExplorer) {
                        patternExplorer.patternExplorer.setActiveFile(null);
                    }
                });
            };
            
            tryLoadAndPlay();
        }
        
        // Unload current file (stop and hide visualizer)
        function unloadCurrentFile() {
            if (audioPlayer) {
                audioPlayer.stop();
            }
            currentFilePath = null;
            
            // Clear visualizer pause state
            if (visualizer) {
                visualizer.clearPauseState();
            }
            
            // Clear pending file if exists
            window._pendingFileToLoad = null;
            window._pendingFilePath = null;
            window._pendingAudioUrl = null;
            
            hideVisualizer();
            
            // Clear active state in PatternExplorer
            if (patternExplorer && patternExplorer.patternExplorer) {
                patternExplorer.patternExplorer.setActiveFile(null);
                patternExplorer.patternExplorer.setPlayingFile(null, false);
            }
        }
        
        // Toggle play/pause for current file
        function togglePlayPause() {
            if (!audioPlayer || !audioPlayer.isLoaded()) return;
            
            if (audioPlayer.isPlaying()) {
                audioPlayer.pause();
            } else {
                // Ensure audio context is started
                if (visualizer) {
                    visualizer.ensureAudioContextStarted();
                }
                audioPlayer.play();
            }
        }
        
        // Handle file click (from PatternExplorer)
        function handleFileClick(file) {
            // Use original path format (without leading slash) to match PatternExplorer
            const filePath = file.path || `audio_files/${file.name}`;
            
            // If clicking the same file that's already loaded, unload it
            if (currentFilePath === filePath) {
                unloadCurrentFile();
                return;
            }
            
            // Reset TEST mode if active - TEST mode should never persist when switching files
            // as it leads to inaccurate baselining (audio playing during baseline phase)
            if (audioControls && audioControls.getLoopMode() === 'test') {
                audioControls.setLoopMode('off');
            }
            
            // Stop current file if playing
            if (audioPlayer && audioPlayer.isPlaying()) {
                audioPlayer.stop();
            }
            
            // Load and play the new file
            loadAndPlayFile(file);
        }
        
        // Handle preview button click (from PatternExplorer)
        function handleFilePreview(file) {
            // Use original path format (without leading slash) to match PatternExplorer
            const filePath = file.path || `audio_files/${file.name}`;
            
            // If this file is already loaded, toggle play/pause
            if (currentFilePath === filePath) {
                togglePlayPause();
                return;
            }
            
            // Otherwise, load and play this file (same as file click)
            handleFileClick(file);
        }
        
        // Initialize PatternExplorerWithFilters component
        function initializeComponent() {
            patternExplorer = new PatternExplorerWithFilters({
                containerId: 'fileList',
                filterContainerId: 'filterPanel',
                files: allFilesList,
                metadata: patternMetadata,
                onFileClick: (file) => {
                    handleFileClick(file);
                },
                onFileHover: (file, metadata, event) => {
                    // Optional: Handle file hover
                },
                onFilePreview: (file) => {
                    handleFilePreview(file);
                },
                onPlayStateChange: (file, isPlaying) => {
                    // Handle play/pause toggle from PatternExplorer
                    if (!audioPlayer || !audioPlayer.isLoaded()) return;
                    
                    const filePath = file.path || `audio_files/${file.name}`;
                    if (currentFilePath !== filePath) return; // Not the current file
                    
                    if (isPlaying) {
                        // Ensure audio context is started
                        if (visualizer) {
                            visualizer.ensureAudioContextStarted();
                        }
                        audioPlayer.play();
                    } else {
                        audioPlayer.pause();
                    }
                }
            });
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Spacebar for play/pause (only if not typing in an input)
            if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
                if (audioPlayer && audioPlayer.isLoaded()) {
                    if (audioPlayer.isPlaying()) {
                        audioPlayer.pause();
                    } else {
                        if (visualizer) {
                            visualizer.ensureAudioContextStarted();
                        }
                        audioPlayer.play();
                    }
                }
            }
        });
        
        // Initialize on page load
        window.addEventListener('DOMContentLoaded', async () => {
            // Initialize DOM references
            mainPlaceholder = document.getElementById('mainPlaceholder');
            visualizerContainer = document.getElementById('visualizerContainer');
            
            await loadPatternMetadata();
            await loadFileList();
        });
    </script>
</body>
</html>
